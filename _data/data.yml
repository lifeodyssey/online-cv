      - role:  Remote Sensing Engineer
        time: Nov.2021 - Feb.2022
        company: Dadi Weattech Inc, Beijing, China
        details: |
            In this company, he is the main responsible person for aquatic remote sensing image processing algorithms. 
            He introduced a aquatic remote sensing image processing system based on SeaDAS, which produces basic aquatic products such as chlorophyll concentration, transparency, and suspended solids concentration for China's coastal and inland lakes. 
            He developed an algal bloom satellite remote sensing algorithm based on machine learning, geostatistics, and the 6S radiation transfer model.  
            This algorithm enables high temporal and spatial resolution monitoring of algal blooms.As the first inventor to file, he obtained a patent for this technology.
            He also wrote processing scripts for some new satellites, such as HY1C/D, Himawari-8, SGLI, and GOCI-II, to enable parallel batch processing of remote sensing data. 
            His work at this company greatly increased the company's competitiveness in the field.       
