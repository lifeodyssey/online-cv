experiences:
    title: Experiences
    info:
      - role: Software Developer
        time: Aug. 2022 - Present
        company: Thoughtworks, Chengdu, China
        overview: |
            Backend and DevOps engineer delivering distributed systems across insurance, banking, e-commerce, healthcare, and construction logistics domains. Consistent 90%+ test coverage through TDD; experienced in cross-timezone Agile collaboration with US, SG, and AU stakeholders.
        details: |

            <strong>Steel/Logistics Delivery Management System (Oct. 2024 – Present)</strong>

            **Backend Engineer**

            - Built SQS-based adaptor service to receive delivery data from third-party logistics systems, handling pre-shipment schedule creation/changes and real-time delivery tracking with Dead Letter Queue for automatic retry.
            - Implemented reliable outbound sync using local message table with scheduled retryer, ensuring eventual consistency without two-phase commit.
            - Achieved P95 latency <200ms for read APIs and <3s for search APIs through database indexing, in-memory caching, thread-pool tuning, materialized views, and read/write separation.
            - Refactored working-day-based business rules into reusable module with policy-based interface, now consumed by 50% of use cases.
            - Coordinated production go-live: Route53/ALB/ECS/RDS cutover, migrated 50k records from third-party system with manual reconciliation, zero data loss in 4 hours.
            - Designed file import, preview, and audit comparison feature using AWS Lambda + S3.
            - Led AI-native coding transformation introducing GitHub Copilot and OpenCode; increased team delivery velocity by 50% within the first sprint through standardized prompt workflows and peer knowledge sharing.

            **DevOps Engineer**

            - Architected multi-account AWS infrastructure (dev/qa/stage/prod) using Terraform and Terragrunt with reusable modules for VPC, ALB, RDS Aurora, ECS, Cognito, and WAF.
            - Created reusable GitHub Actions library (15 actions, 8 workflows), reducing average build time from 5 min to 2.5 min through caching and OIDC auth.
            - Implemented ECS target-tracking autoscaling and scheduled scaling, reducing off-peak cost by 30%; configured WAF rate limiting blocking 95% of bot traffic.

            *Tech Stack*: Kotlin, Spring Boot, AWS (ECS, SQS, Lambda, RDS Aurora, WAF), Terraform, Terragrunt, GitHub Actions, PostgreSQL, JOOQ, Testcontainers, Karate, Gatling

            <strong>AugMed AI - Clinical Decision Support Platform (Feb. 2024 – Oct. 2024)</strong>

            **Full-Stack & DevOps Developer**

            - Clinical decision support platform with OMOP CDM integration (50+ clinical tables). Built with Python/Flask, maintained 90%+ test coverage.
            - Implemented JWT-based auth with refresh token rotation and role-based access control for 4 permission levels.
            - Led 10+ client showcases with US stakeholders, contributing to project extension.

            *Tech Stack*: Python, Flask, PostgreSQL, AWS ECS, GitHub Actions, Pytest

            <strong>Direct-to-Customer E-commerce Platform (Jul. 2023 – Jan. 2024)</strong>

            - Implemented near real-time synchronization of orders, shipments, and inventory between SAP and e-commerce platform using message queues and async callbacks, handling distributed transactions with Saga pattern.
            - Maintained 90%+ test coverage through TDD, using TestContainers, Karate, and Gatling.

            *Tech Stack*: Kotlin, Spring Boot, Azure Cosmos DB, Jenkins, Kubernetes

            <strong>Banking IAM Platform (Mar. 2023 – Jun. 2023)</strong>

            - Developed single sign-on authentication for direct login from third-party apps to core banking. Proposed and led seamless backend upgrade using Strangler Pattern.

            <strong>Insurance Quotation System (Oct. 2022 – Mar. 2023)</strong>

            - Improved quotation API response time by 50% through in-memory caching and query optimization.

      - role: Backend Developer (Contract, Remote)
        time: Apr. 2025 – Jul. 2025
        company: Elith, Tokyo, Japan
        details: |
            AI platform backend development using FastAPI/Python/AWS for a Japanese job review platform.

      - role: Backend Developer (Contract, Remote)
        time: Oct. 2023 – Dec. 2023
        company: Grid Solutions, Tokyo, Japan
        details: |
            TypeScript/NestJS backend development for an ML-based power trading platform. Integrated AWS X-Ray SDK, implemented unit and API tests.

            *Tech Stack*: TypeScript, NestJS, PostgreSQL, AWS Lambda, AWS S3, CircleCI

